<svg viewBox="0 0 920 150" xmlns="http://www.w3.org/2000/svg" font-family="Microsoft YaHei UI, Segoe UI, sans-serif">
  <rect x="0" y="0" width="920" height="150" rx="10" fill="#f7f8fa" stroke="#d4d9e2"/>
  <text x="24" y="32" font-size="16" font-weight="bold" fill="#1f2a44">四步完成批量改名</text>

  <!-- step 1 -->
  <rect x="24" y="52" width="180" height="64" rx="8" fill="#ffffff" stroke="#2d6cdf" stroke-width="1.5"/>
  <circle cx="50" cy="84" r="14" fill="#2d6cdf"/>
  <text x="50" y="89" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
  <text x="74" y="80" font-size="14" font-weight="bold" fill="#1f2a44">添加文件夹</text>
  <text x="74" y="100" font-size="11.5" fill="#6b7280">可加多个</text>

  <!-- step 2 -->
  <rect x="246" y="52" width="180" height="64" rx="8" fill="#ffffff" stroke="#2d6cdf" stroke-width="1.5"/>
  <circle cx="272" cy="84" r="14" fill="#2d6cdf"/>
  <text x="272" y="89" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
  <text x="296" y="80" font-size="14" font-weight="bold" fill="#1f2a44">选择命名设置</text>
  <text x="296" y="100" font-size="11.5" fill="#6b7280">模式 / 模板 / 补零</text>

  <!-- step 3 -->
  <rect x="468" y="52" width="180" height="64" rx="8" fill="#ffffff" stroke="#2d6cdf" stroke-width="1.5"/>
  <circle cx="494" cy="84" r="14" fill="#2d6cdf"/>
  <text x="494" y="89" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
  <text x="518" y="80" font-size="14" font-weight="bold" fill="#1f2a44">生成预览</text>
  <text x="518" y="100" font-size="11.5" fill="#6b7280">确认无红色错误</text>

  <!-- step 4 -->
  <rect x="690" y="52" width="206" height="64" rx="8" fill="#2d6cdf"/>
  <circle cx="716" cy="84" r="14" fill="#ffffff"/>
  <text x="716" y="89" font-size="15" font-weight="bold" fill="#2d6cdf" text-anchor="middle">4</text>
  <text x="740" y="80" font-size="14" font-weight="bold" fill="#ffffff">确认执行改名</text>
  <text x="740" y="100" font-size="11.5" fill="#dce7ff">完成并生成日志</text>

  <!-- arrows -->
  <text x="222" y="90" font-size="20" fill="#9aa3b2" text-anchor="middle">→</text>
  <text x="444" y="90" font-size="20" fill="#9aa3b2" text-anchor="middle">→</text>
  <text x="666" y="90" font-size="20" fill="#9aa3b2" text-anchor="middle">→</text>

  <text x="24" y="138" font-size="11.5" fill="#8a93a3">改错了别慌：随时可用“撤销最近一次”恢复到改名前。</text>
</svg>
